name: CI Pipeline

on:
  push:
    branches:
      - main
      - 'feature/*'
      - 'feature/*/*'
  pull_request:
    branches:
      - main
      - 'feature/*'
      - 'feature/*/*'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16, 18, 20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install

      - name: Run ESLint
        run: yarn lint

      - name: Run tests
        run: yarn test

      - name: Build project
        run: yarn build
